services:
  - type: web
    name: yuban-ai-product
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "node server.mjs"
    envVars:
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_BASE_URL
        value: https://api.deepseek.com
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_TIMEOUT_MS
        value: "30000"
      - key: LLM_API_KEY
        sync: false
